[project]
name = "tvbox_config"
version = "1.0.0"
description = "TVBox source checker and JSON generator"
requires-python = ">=3.12"
dependencies = [
    "dirtyjson>=1.0.8",
    "pyyaml>=6.0.3",
    "requests>=2.34.2",
]

[tool.uv]
index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"

[tool.uv.sources]
tvbox_config = { path = "src" }
