[project]
name = "tvbox_config"
version = "1.1.0"
description = "TVBox source checker and JSON generator"
requires-python = ">=3.12"
dependencies = [
    "dirtyjson>=1.0.8",
    "httpx>=0.27.0",
    "pyyaml>=6.0.3",
]

[project.scripts]
tvbox-config = "tvbox_config.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = ["ruff>=0.1.0"]

[tool.uv.sources]
tvbox_config = { path = "src/tvbox_config", editable = true }

[tool.ty.environment]
python = ".venv"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
